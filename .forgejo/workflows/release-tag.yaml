name: Release on Tag
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-release:
    runs-on: ubuntu-latest-x86_64-medium
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup zig
        uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.16.0
      
      - name: Build release
        run: zig build release -Doptimize=ReleaseFast

      - name: Package release
        working-directory: zig-out
        run: |
          set -e
          for artifact in *; do 
            if [[ $artifact == *"-windows-"* ]]; then
              zip -q -r "$artifact.zip" "$artifact"/*
            else 
              tar -czf "$artifact.tar.gz" "$artifact"/*
            fi
            rm -r -- $artifact
          done

      - name: Release
        uses: actions/forgejo-release@v2.7.3
        with:
          tag: ${{ forge.ref_name }}
          prerelease: ${{ contains(forge.ref_name, '-') }}
          direction: upload
          release-dir: zig-out/
          release-notes-assistant: true
