name: CI
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  build-test:
    runs-on: ubuntu-latest-x86_64-medium
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup zig
        uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: master

      - name: Test
        run: zig build test

      - name: Build tools
        run: zig build

      # We don't test them yet in CI as we need a way to do it (what emulator? does any support headless?) but at least they must build.
      - name: Build all standalone 3DS tests
        run: zig build build-tests
